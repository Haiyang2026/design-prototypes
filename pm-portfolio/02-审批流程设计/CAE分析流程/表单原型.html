<!DOCTYPE html>
<html lang="zh-CN">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>CAE分析申请流程</title><style>
:root{--primary:#3685F2;--phover:#5E9DF5;--pactive:#2364CC;--pbg:#DEEDFF;--lbg:#F3F8FE;--brand:#0C328C;--green:#04D999;--glight:#E6FBF5;--warn:#FF813B;--red:#FF4D5D;--rlight:#FFEDEF;--t1:#141b24;--t2:#7C8493;--t3:#B9BFCB;--td:#D2D7E1;--tw:#fff;--bg:#EBF1F6;--card:#fff;--hd:#F4F7F9;--hv:#EDF3FA;--bd:#D2D7E1;--dv:#E4E7F0;--f:applestem,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"PingFang SC","Microsoft YaHei",sans-serif;--fxs:11px;--fsm:12px;--fb:13px;--flg:14px;--sb:600;--lh:1.5;--sxs:4px;--ssm:8px;--smd:12px;--sb2:16px;--slg:20px;--sxl:24px;--r2:4px;--r3:8px;--sh:0 1px 5px rgba(20,27,36,.10);--tf:150ms ease-in-out}
body{margin:0;font:var(--fsm)/var(--lh) var(--f);color:var(--t1);background:var(--bg)}
/* TOP NAV */
.top{position:fixed;top:0;left:0;right:0;height:42px;background:var(--brand);display:flex;align-items:center;justify-content:space-between;padding:0 20px 0 0;z-index:100;box-shadow:var(--sh)}
.tl{display:flex;align-items:center}.tl svg.logo{width:180px;height:auto;filter:brightness(0) invert(1)}
.tm{display:flex;align-items:center;height:42px;gap:0}
.tm a{display:flex;align-items:center;padding:0 16px;color:#fff;font-size:14px;font-weight:600;cursor:pointer;height:42px;transition:all var(--tf);text-decoration:none}
.tm a:hover{background:rgba(255,255,255,.1)}.tm a.on{background:#fff;color:var(--brand)}
.tr{display:flex;gap:var(--smd);color:#fff;font-size:var(--fsm)}
/* SIDEBAR */
.side{position:fixed;top:42px;left:0;bottom:0;width:180px;background:var(--card);border-right:1px solid var(--dv);overflow-y:auto;z-index:99;padding:8px 0}
.sg{font-size:var(--fxs);color:var(--t2);padding:8px 12px 4px;font-weight:var(--sb);text-transform:uppercase;letter-spacing:.5px}
.si{display:flex;align-items:center;padding:0 12px;height:32px;font-size:var(--fb);color:var(--t1);cursor:pointer;transition:all var(--tf)}
.si:hover{background:var(--hv)}.si.on{background:var(--pbg);color:var(--primary);font-weight:var(--sb)}
.sgn{font-weight:400;color:var(--t3);font-size:var(--fxs);margin-left:auto}
.si .dot{width:6px;height:6px;border-radius:50%;margin-right:8px;flex-shrink:0}
.si .dot.g{background:var(--green)}.si .dot.b{background:var(--primary)}
/* MAIN */
.main{margin:42px 0 0 180px;min-height:calc(100vh-42px)}
.ctn{padding:var(--sb2)}
.card{background:var(--card);border-radius:var(--r2);box-shadow:var(--sh);margin-bottom:var(--sb2);overflow:hidden}
.cbar{display:flex;align-items:center;justify-content:space-between;padding:var(--smd) var(--sb2);border-bottom:1px solid var(--dv)}
.ct{font-size:14px;font-weight:var(--sb);padding-left:8px;border-left:3px solid var(--primary);line-height:20px}
.btns{display:flex;gap:4px}
.bl{padding:2px 8px;border:none;background:none;font-size:var(--fsm);color:var(--primary);cursor:pointer;border-radius:var(--r2)}
.bl:hover{background:var(--lbg)}
/* FORM */
.fb{padding:20px}
.sec{margin-bottom:var(--sxl)}.sec:last-child{margin-bottom:0}
.shd{display:flex;align-items:center;gap:var(--ssm);margin-bottom:var(--sb2);cursor:pointer;user-select:none}
.st{font-size:var(--fb);font-weight:var(--sb);color:var(--primary)}
.sa{width:14px;height:14px;transition:transform .2s}
.sec.cl .sa{transform:rotate(-90deg)}.sec.cl .sc{display:none}
/* GRID */
.fr{display:flex;gap:var(--sb2);margin-bottom:var(--sb2)}.fr:last-child{margin-bottom:0}
.fi{flex:1;min-width:0}.fi.fw{flex:0 0 100%}
.fl{display:block;font-size:var(--fsm);color:var(--t1);margin-bottom:var(--ssm);line-height:1;font-weight:var(--sb)}
.fl .rq{color:var(--red)}.fl .h{font-weight:400;color:var(--t2);font-size:var(--fxs);margin-left:var(--sxs)}
/* INPUTS */
.in{box-sizing:border-box;width:100%;height:32px;padding:5px 8px;border:1px solid var(--bd);border-radius:var(--r2);font-size:var(--fsm);color:var(--t1);background:#fff;transition:all var(--tf);font-family:inherit}
.in::placeholder{color:var(--t3)}.in:hover{border-color:var(--phover)}.in:focus{outline:none;border-color:var(--pactive);box-shadow:0 0 0 2px rgba(35,100,204,.1)}
.in:disabled{background:var(--hd);color:var(--td);cursor:not-allowed}
.ta{box-sizing:border-box;width:100%;min-height:80px;padding:8px 12px;border:1px solid var(--bd);border-radius:var(--r2);font-size:var(--fsm);color:var(--t1);background:#fff;transition:all var(--tf);font-family:inherit;resize:vertical;line-height:1.5}
.ta:focus{outline:none;border-color:var(--pactive)}
.sel{box-sizing:border-box;width:100%;height:32px;padding:5px 28px 5px 8px;border:1px solid var(--bd);border-radius:var(--r2);font-size:var(--fsm);color:var(--t1);appearance:none;background:#fff url("data:image/svg+xml,%3Csvg viewBox='0 0 16 16' fill='%237C8493'%3E%3Cpath d='M4 6L8 10L12 6' stroke='%237C8493' stroke-width='1.5' fill='none'/%3E%3C/svg%3E") no-repeat right 8px center;background-size:12px;cursor:pointer}
.sel:hover{border-color:var(--phover)}.sel:focus{outline:none;border-color:var(--pactive)}
.sel:disabled{background:var(--hd);cursor:not-allowed}
/* TABLE */
.dt{width:100%;border-collapse:collapse}.dt th{padding:var(--ssm) var(--sb2);text-align:left;font-size:var(--fsm);font-weight:var(--sb);color:var(--t1);background:var(--hd);border-bottom:1px solid var(--dv)}
.dt td{padding:var(--ssm) var(--sb2);border-bottom:1px solid var(--dv)}.dt tr:nth-child(even){background:var(--hd)}
.dt .in{border:none;border-radius:0;height:24px;padding:2px 4px;background:transparent}.dt .in:focus{box-shadow:none;outline:1px solid var(--pactive)}
.dt .ac{text-align:center;width:50px}.dt .ac button{color:var(--red);border:none;background:none;cursor:pointer;font-size:var(--fxs)}
/* UPLOAD */
.up{border:1px dashed var(--bd);border-radius:var(--r2);padding:var(--ssm) var(--sb2);text-align:center;cursor:pointer;background:var(--hd);transition:all var(--tf)}
.up:hover{border-color:var(--primary);background:var(--lbg)}.up .ut{font-size:var(--fsm);color:var(--t2)}
/* DEV NOTES (old per-section, removed) */
/* UNIFIED DEV NOTES — bottom of each step page */
.da{margin-top:var(--sxl);border:1px solid var(--dv);border-radius:var(--r3);overflow:hidden}
.dah{display:flex;align-items:center;gap:var(--sxs);padding:var(--ssm) var(--smd);cursor:pointer;font-size:var(--fsm);color:var(--t2);background:var(--hd);font-weight:var(--sb)}
.dah:hover{background:var(--dv)}.dab{padding:var(--smd) var(--sb2);display:none;font-size:var(--fxs);line-height:1.7;color:var(--t2);background:#fafbfc}
.da.op .dab{display:block}.dv2{width:12px;height:12px;transition:transform .2s}.da.op .dv2{transform:rotate(90deg)}
.dag{font-size:var(--fsm);color:var(--t1);font-weight:var(--sb);margin:var(--ssm) 0 var(--sxs)}
.dai{display:flex;flex-direction:column;gap:2px;padding-left:var(--smd);margin-bottom:var(--smd)}
.dai>div{padding:2px 0;border-bottom:1px dotted #e8e8e8}.dai>div:last-child{border:none}
.stb{font-size:var(--fxs);color:var(--t2);font-weight:var(--sb);margin-bottom:var(--ssm)}
/* COMBINED FIELD */
.dc{display:flex;align-items:center;gap:4px}.dc .in{flex:1}.dc span{color:var(--t2);font-size:var(--fxs)}
/* WIDTH OVERRIDE */
.fw2{flex:2!important}
/* TABLE TOOLBAR */
.dtb{display:flex;align-items:center;justify-content:space-between;margin-bottom:var(--ssm);padding:var(--ssm) 0}
.btm{padding:4px 10px;border:1px solid var(--bd);border-radius:var(--r2);font-size:var(--fxs);background:var(--card);color:var(--t1);cursor:pointer;transition:all var(--tf);font-family:inherit}
.btm:hover{border-color:var(--primary);color:var(--primary)}
/* DIM */
.dim{opacity:.5}.dim .in,.dim .ta,.dim .sel{pointer-events:none}.dim label{color:var(--t2)}
.ft{display:flex;justify-content:flex-end;gap:var(--ssm);padding:var(--smd) var(--sb2);border-top:1px solid var(--dv)}
.bt{padding:6px 20px;border-radius:var(--r2);font-size:var(--fsm);cursor:pointer;border:1px solid transparent;transition:all var(--tf);height:32px;font-family:inherit}
.bt1{background:var(--primary);color:#fff}.bt1:hover{background:var(--phover)}
.bt2{background:#fff;color:var(--t2);border:1px solid var(--bd)}.bt2:hover{border-color:var(--primary);color:var(--primary)}
/* BADGE */
.bg{display:inline-block;font-size:10px;padding:1px 6px;border-radius:999px;font-weight:600;vertical-align:middle;margin-left:4px}
.bgr{background:var(--rlight);color:var(--red)}.bgg{background:var(--hd);color:var(--t2)}.bgb{background:var(--lbg);color:var(--primary)}
/* STEP HEADER */
.step-bar{display:flex;align-items:center;gap:var(--sb2);padding:var(--sb2);background:var(--hd);border-bottom:1px solid var(--dv)}
.step-dot{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:var(--sb);font-size:var(--flg);flex-shrink:0}
.step-dot.ap{background:var(--glight);color:var(--green);border:2px solid var(--green)}
.step-dot.ex{background:var(--lbg);color:var(--primary);border:2px solid var(--primary)}
.step-dot.ex.pa{background:#f0f0ff;color:#7c3aed;border:2px solid #7c3aed}
.step-info{flex:1}.step-info .sn{font-size:var(--flg);font-weight:var(--sb)}.step-info .sm{font-size:var(--fsm);color:var(--t2);margin-top:2px}
.step-rules{text-align:right;font-size:var(--fxs);color:var(--t2)}
.step-rules span{margin-left:12px}.step-rules .no{color:var(--red);font-weight:var(--sb)}.step-rules .yes{color:var(--green)}
.step-note{background:#FFF9F0;padding:var(--ssm) var(--sb2);font-size:var(--fxs);color:var(--t2);border-bottom:1px solid #f0e0c0}
/* COMBINED FIELD */
.dc{display:flex;align-items:center;gap:4px}.dc .in{flex:1}.dc span{color:var(--t2);font-size:var(--fxs)}
/* WIDTH OVERRIDE */
.fw2{flex:2!important}
/* TABLE TOOLBAR */
.dtb{display:flex;align-items:center;justify-content:space-between;margin-bottom:var(--ssm);padding:var(--ssm) 0}
.btm{padding:4px 10px;border:1px solid var(--bd);border-radius:var(--r2);font-size:var(--fxs);background:var(--card);color:var(--t1);cursor:pointer;transition:all var(--tf);font-family:inherit}
.btm:hover{border-color:var(--primary);color:var(--primary)}
/* DIM */
.dim{opacity:.5}.dim .in,.dim .ta,.dim .sel{pointer-events:none}.dim label{color:var(--t2)}
/* SECTION BORDER */
.hr{margin:var(--sb2) 0;padding-top:var(--sb2);border-top:1px solid var(--dv)}
.hr-t{font-size:var(--fxs);color:var(--t2);margin-bottom:var(--sb2)}
</style></head><body>

function label(n,r,h){return`<label class="fl">${r?`<span class="rq">*</span>`:''}${n}${h?` <span class="h">${h}</span>`:''}</label>`}
function renderRow(arr,state,stepId){
  if(!arr||!arr.length)return'';
  let h='';arr.forEach(f=>{let st=f._st||state;let wCls=(f.w&&f.w===2?' fw2':'');h+='<div class="fi'+(f.t==='多行文本'||f.t==='附件'||f.t&&f.t.includes('附件')?' fw':wCls)+'">';
    if(f.t==='双字段'){
      let dis=st!=='edit'?'disabled':'';
      h+=`<label class="fl"><span class="rq">*</span>工号 <span style="font-weight:400;color:var(--t2);font-size:var(--fxs)">/ 岗位</span></label><div class="dc"><input class="in" ${dis} placeholder="${dis?'系统获取':''}"><span>/</span><input class="in" ${dis} placeholder="${dis?'系统获取':''}"></div>`;
    }else if((f.t&&f.t.includes('附件'))||f.t==='附件'){
      let dim=st!=='edit';
      h+=label(f.n)+`<div class="up${dim?' dim':''}"><div class="ut">📎 ${dim?'本环节不可上传':'点击上传'+(f.n.includes('报告')?'CAE分析报告':'附件（支持多文件）')}</div></div>`;
    }else if(f.t==='多行文本'){
      h+=label(f.n,f.r,(st!=='edit'?'':'非必填'))+`<textarea class="ta" ${st!=='edit'?'disabled':''} placeholder="${st!=='edit'?'本环节只读':''}"></textarea>`;
    }else if(f.t==='下拉选择'||f.t==='下拉多选'){
      let opt=f.o||[];
      h+=label(f.n,f.r)+`<select class="sel" ${st!=='edit'?'disabled':''}><option>${st!=='edit'?'请选择：'+opt.join('/'):'请选择：'+opt.join('/')}</option>${opt.map(x=>'<option>'+x+'</option>').join('')}</select>`;
    }else if(f.t==='多选'){
      let opt=f.note?f.note.split('/'):[];
      h+=label(f.n,f.r)+`<select class="sel" ${st!=='edit'?'disabled':''}><option>${'请选择：'+opt.join('/')}</option>${opt.map(x=>'<option>'+x+'</option>').join('')}</select>`;
    }else if(f.t==='人员选择器(多选)'){
      h+=label(f.n,f.r)+`<input class="in" ${st!=='edit'?'disabled':''} placeholder="${st==='edit'?'选择CAE分析工程师（多选）':'本环节只读'}">`;
    }else if(f.t==='人员选择器(单选)'){
      h+=label(f.n,f.r)+`<input class="in" ${st!=='edit'?'disabled':''} placeholder="${st==='edit'?'选择CAE分析工程师':'本环节只读'}">`;
    }else if(f.t==='日期'){
      h+=label(f.n,f.r)+`<input class="in" type="date" ${st!=='edit'?'disabled':''}>`;
    }else if(f.t==='单选'){
      let opt='非常满意(优秀)/满意(良)/一般/不满意(差)'.split('/');
      h+=label(f.n,f.r)+`<select class="sel" ${st!=='edit'?'disabled':''}><option>${'请选择：'+opt.join('/')}</option>${opt.map(x=>'<option>'+x+'</option>').join('')}</select>`;
    }else{
      h+=label(f.n,f.r)+`<input class="in" ${st!=='edit'?'disabled':''} placeholder="${st!=='edit'?'本环节只读':''}">`;
    }
    h+='</div>';
  });
  return h;
}
function gridRows(arr,state,stepId){
  let rows=[],cur=[],curW=0;
  arr.forEach(f=>{
    let full=f.t==='多行文本'||f.t==='附件'||(f.t&&f.t.includes('附件'));
    let w=f.w||1;
    if(full||curW+w>4){
      if(cur.length)rows.push(cur);
      cur=[];curW=0;
    }
    if(full){rows.push([f]);}else{cur.push(f);curW+=w;}
  });
  if(cur.length)rows.push(cur);
  // 严格只用4列或2列，绝不用3列：3字段(w1各1)的行拆为2+1
  let fixed=[];
  rows.forEach(r=>{
    let tw=r.reduce((s,x)=>s+(x.w||1),0);
    if(r.length===3 && tw===3 && !r.some(x=>x.t==='多行文本'||x.t==='附件'||(x.t&&x.t.includes('附件')))){
      fixed.push(r.slice(0,2));
      fixed.push([r[2]]);
    }else{
      fixed.push(r);
    }
  });
  return fixed.map(r=>`<div class="fr${r.every(x=>{let st=x._st||state;return st!=='edit'})?' dim':''}">${renderRow(r,state,stepId)}</div>`).join('');
}

function selectStep(id){

    </div>

  // Content — fixed group order per document §1.1
  let c='',devAll=[];
  
  // 字段可视性 helper（本流程无不�见要求，全部字段显示）
  function fv(f,stepId){
    let s=f.s;

  // 1-申请人信息（全局可见，默认折叠）

  devAll.push({t:'申请信息',i:['分析项目名称：单行文本，必填','所属单位：下拉选择，必填（来源：业务范围-工厂）','需要完成日期：日期选择框，必填','分析问题类型：下拉选择，必填。选项：力学/流体/热/其他','分析目的说明：多行文本，必填','备选方案说明：多行文本，非必填']});

  // 3-结构材料
  c+=secHTML('结构材料（尽量提供材料物性表）',dataTable(fields.structure.cols,[{}],{n:'子表',rq:false}));
  devAll.push({t:'结构材料子表',i:['全部单行文本 ｜ 非必填 ｜ 提示：尽量提供材料物性表']});

  let attAll=fields.attach.map(f=>({...f,_st:fv(f,id)})).filter(x=>x._st!=='hidden');

    let attEd=attAll.filter(x=>x._st==='edit'),attRd=attAll.filter(x=>x._st==='readonly');

  // 统一开发备注区域（所有环节底部）

  document.getElementById('stepContent').innerHTML=c;

function dataTable(cols,rows,opts){
  let n=opts?opts.n||'':'';rows=rows||[{}];let rq=opts?opts.rq:false;let types=opts?opts.types||[]:[];let selOpts=opts?opts.selOpts||[]:[];
  let tg=`<div class="dtb">${n?`<span style="font-weight:var(--sb);font-size:var(--fb)">${n}</span>`:''}<div style="display:flex;gap:4px">`;
  tg+=`<button class="btm" onclick="addRow(this)">＋ 新增行</button>`;
  tg+=`<button class="btm" onclick="importCSV(this)">⬆ 导入</button>`;
  tg+=`<button class="btm" onclick="exportCSV(this)">⬇ 导出</button>`;
  tg+=`</div></div><table class="dt"><thead><tr>${cols.map(x=>'<th>'+(rq?'<span class="rq">*</span>':'')+x+'</th>').join('')}<th class="ac">操作</th></tr></thead><tbody>`;
  // store types on table for addRow reference
  let typesStr=types.length?` data-types="${types.join(',')}"`:'';let selOptsStr=selOpts.length?` data-selopts="${selOpts.map(x=>x.join('|')).join(';;')}"`:'';
  tg=tg.replace('<table class="dt"','<table class="dt"'+typesStr+selOptsStr);
  rows.forEach(()=>{
    tg+=`<tr>${cols.map((c,i)=>'<td>'+tc(i,types,selOpts)+'</td>').join('')}<td class="ac"><button onclick="delRow(this)">🗑</button></td></tr>`;
  });
  return tg+`</tbody></table>`;
}
function tc(i,types,selOpts){
  if(types[i]==='select'){let o=selOpts[i]||[];return`<select class="sel" style="height:24px;padding:2px;font-size:var(--fxs)">${o.map(x=>'<option>'+x+'</option>').join('')}</select>`;}
  return `<input class="in">`;
}
function addRow(btn){
  let tbl=btn.closest('.sec').querySelector('table');let tbody=tbl.querySelector('tbody');
  let types=(tbl.dataset.types||'').split(',');let selOpts=[];
  (tbl.dataset.selopts||'').split(';;').forEach(x=>{selOpts.push(x.split('|'));});
  let nCols=tbody.querySelector('tr').querySelectorAll('td').length;
  let nr=document.createElement('tr');
  for(let i=0;i<nCols-1;i++){let td=document.createElement('td');td.innerHTML=tc(i,types,selOpts);nr.appendChild(td);}
  let ac=document.createElement('td');ac.className='ac';ac.innerHTML='<button onclick="delRow(this)">🗑</button>';nr.appendChild(ac);
  tbody.appendChild(nr);
}
function delRow(btn){
  let tbody=btn.closest('tbody');
  if(tbody.querySelectorAll('tr').length>1)btn.closest('tr').remove();else alert('至少保留一行数据');
}
